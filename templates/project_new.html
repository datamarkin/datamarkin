{% extends "base.html" %}

{% block title %}New Project — Datamarkin{% endblock %}

{% block content %}
    <section class="section">
        <div class="container" style="max-width: 600px;">
            <div class="content">
                <h1 class="is-size-3">Create a new project</h1>
            </div>

            <form method="POST" action="/project/new">
                <div class="field">
                    <label class="label">Name</label>
                    <div class="control">
                        <input class="input" type="text" name="name" placeholder="My project" required>
                    </div>
                </div>

                <div class="field">
                    <label class="label">Type</label>
                    <div class="control">
                        <div class="select is-fullwidth">
                            <select name="type" id="project-type" required>
                                <option value="object_detection">Object Detection</option>
                                <option value="classification">Classification</option>
                                <option value="segmentation">Segmentation</option>
                                <option value="keypoint-detection">Keypoint Detection</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="field">
                    <label class="label">Labels</label>
                    <p class="help is-size-7 has-text-grey">Define labels for your project. Each label will be used for annotation.</p>
                    <div id="labels-container"></div>
                    <button type="button" class="button is-small is-app mt-2" onclick="addLabel()">
                        Add label
                    </button>
                </div>

                <input type="hidden" name="labels" id="labels-json">

                <hr>

                <div class="field">
                    <div class="control">
                        <button type="submit" class="button is-app">Create project</button>
                        <a href="/projects" class="button is-light ml-2">Cancel</a>
                    </div>
                </div>
            </form>
        </div>
    </section>

    <script>
        const projectTypeSelect = document.getElementById('project-type');

        document.addEventListener('DOMContentLoaded', function() {
            addLabel();
            projectTypeSelect.addEventListener('change', onTypeChange);
        });

        function onTypeChange() {
            const isKeypoint = projectTypeSelect.value === 'keypoint-detection';
            document.querySelectorAll('.keypoint-editor').forEach(el => {
                el.style.display = isKeypoint ? '' : 'none';
            });
        }

        function addLabel(name, color) {
            const container = document.getElementById('labels-container');
            const isKeypoint = projectTypeSelect.value === 'keypoint-detection';
            const wrapper = document.createElement('div');
            wrapper.className = 'label-row-wrapper mb-2';
            wrapper.innerHTML = `
                <div class="field has-addons mt-2 mb-0">
                    <div class="control is-expanded">
                        <input class="input label-name" type="text" placeholder="Label name" value="${name || ''}">
                    </div>
                    <div class="control">
                        <input class="label-color" type="color" value="${color || '#3498db'}" style="height:40px; width:50px; border:1px solid #dbdbdb; border-radius:4px; cursor:pointer;">
                    </div>
                    <div class="control">
                        <button type="button" class="button is-light" onclick="this.closest('.label-row-wrapper').remove()">
                            &times;
                        </button>
                    </div>
                </div>
                <div class="keypoint-editor pl-4 pt-1" style="${isKeypoint ? '' : 'display:none'}">
                    <div class="keypoints-list"></div>
                    <button type="button" class="button is-small is-light mt-1" onclick="addKeypointToLabel(this)">
                        + Add keypoint
                    </button>
                </div>
            `;
            container.appendChild(wrapper);
        }

        function addKeypointToLabel(btn, kpName, kpColor) {
            const kpList = btn.closest('.keypoint-editor').querySelector('.keypoints-list');
            const kpRow = document.createElement('div');
            kpRow.className = 'field has-addons mt-1';
            kpRow.innerHTML = `
                <div class="control is-expanded">
                    <input class="input is-small kp-name" type="text" placeholder="Keypoint name (e.g. head)" value="${kpName || ''}">
                </div>
                <div class="control">
                    <input class="kp-color" type="color" value="${kpColor || '#e74c3c'}" style="height:32px; width:40px; border:1px solid #dbdbdb; border-radius:4px; cursor:pointer;">
                </div>
                <div class="control">
                    <button type="button" class="button is-small is-light" onclick="this.closest('.field').remove()">&times;</button>
                </div>
            `;
            kpList.appendChild(kpRow);
        }

        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();

            const labels = [];
            const isKeypoint = projectTypeSelect.value === 'keypoint-detection';
            let hasValidLabel = false;

            document.querySelectorAll('#labels-container .label-row-wrapper').forEach((wrapper, index) => {
                const nameInput = wrapper.querySelector('.label-name');
                const colorInput = wrapper.querySelector('.label-color');
                const name = nameInput.value.trim();
                const color = colorInput.value.replace('#', '');

                if (name) {
                    const labelObj = { id: index, name: name, color: color };

                    if (isKeypoint) {
                        const keypoints = [];
                        wrapper.querySelectorAll('.keypoints-list .field').forEach((kpRow, kpIndex) => {
                            const kpName = kpRow.querySelector('.kp-name').value.trim();
                            const kpColor = kpRow.querySelector('.kp-color').value.replace('#', '');
                            if (kpName) {
                                keypoints.push({ id: kpIndex, name: kpName, color: kpColor });
                            }
                        });
                        labelObj.keypoints = keypoints;
                        labelObj.skeleton = [];
                    }

                    labels.push(labelObj);
                    hasValidLabel = true;
                }
            });

            if (!hasValidLabel) {
                alert('Please add at least one valid label.');
                return;
            }

            document.getElementById('labels-json').value = JSON.stringify(labels);
            e.target.submit();
        });
    </script>
{% endblock %}
