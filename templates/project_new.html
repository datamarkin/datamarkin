{% extends "base.html" %}

{% block title %}New Project — Datamarkin{% endblock %}

{% block content %}
    <section class="section">
        <div class="container" style="max-width: 600px;">
            <div class="content">
                <h1 class="is-size-3">Create a new project</h1>
            </div>

            <form method="POST" action="{{ url_for('project_new') }}">
                <div class="field">
                    <label class="label">Name</label>
                    <div class="control">
                        <input class="input" type="text" name="name" placeholder="My project" required>
                    </div>
                </div>

                <div class="field">
                    <label class="label">Type</label>
                    <div class="control">
                        <div class="select is-fullwidth">
                            <select name="type" id="project-type" required>
                                <option value="object_detection">Object Detection</option>
                                <option value="classification">Classification</option>
                                <option value="segmentation">Segmentation</option>
                                <option value="keypoint-detection">Keypoint Detection</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="field">
                    <label class="label">Labels</label>
                    <p class="help is-size-7 has-text-grey">Define labels for your project. Each label will be used for annotation.</p>
                    <div id="labels-container"></div>
                    <button type="button" class="button is-small is-app mt-2" onclick="addLabel()">
                        Add label
                    </button>
                </div>

                <input type="hidden" name="labels" id="labels-json">

                <hr>

                <div class="field">
                    <div class="control">
                        <button type="submit" class="button is-app">Create project</button>
                        <a href="{{ url_for('projects') }}" class="button is-light ml-2">Cancel</a>
                    </div>
                </div>
            </form>
        </div>
    </section>

    <script src="{{ url_for('static', filename='js/project-form.js') }}"></script>
{% endblock %}
