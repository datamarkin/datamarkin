<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Datamarkin{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bulma.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/custom.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/annotation.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/zoomist.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/zoomist-child.css') }}">

    <script src="{{ url_for('static', filename='js/zoomist.umd.js') }}" charset="utf-8"></script>
    <script src="{{ url_for('static', filename='js/markin.js') }}"></script>
</head>
<body>


<div class="app-shell">
    {% block titlebar %}
        <div class="titlebar">
            <div class="titlebar-left">
                <a href="{{ url_for('projects') }}" class="logo-button button is-small is-app" title="Datamarkin">
                    <img class="image is-32x32" src="{{ url_for('static', filename='images/logo.svg') }}" alt="">
                </a>
            </div>
            <div class="titlebar-center">
                <nav class="tab-pills">
                    <a href="{{ url_for('projects') }}" class="tab-pill {{ 'is-active' if active_tab == 'projects' }}">Projects</a>
                    <a href="{{ url_for('agentui.serve_app') }}" class="tab-pill {{ 'is-active' if active_tab == 'workflows' }}">Workflows</a>
                    <a href="{{ url_for('studio') }}" class="tab-pill {{ 'is-active' if active_tab == 'studio' }}">Studio</a>
                </nav>
            </div>
            <div class="titlebar-right">
{#                <a href="/settings" class="button is-small is-app {{ 'is-active' if active_tab == 'settings' }}"#}
{#                   title="Settings">#}
{#                    <span class="is-hidden-label">Settings</span>#}
{#                    <span class="icon is-small">#}
{#                      {% include 'icons/cog-6-tooth.svg' %}#}
{#                    </span>#}
{#                </a>#}
            </div>
        </div>
    {% endblock %}
    <div class="app-body">
        {% block sidebar %}{% endblock %}
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
</div>

<!-- Download progress toasts -->
<div id="download-toasts" style="
    position: fixed; bottom: 16px; right: 16px; z-index: 9999;
    display: flex; flex-direction: column-reverse; gap: 8px;
    pointer-events: none;
"></div>
<script>
// ── Global toast notification ───────────────────────────────────────────────
(function() {
    const container = document.getElementById('download-toasts');

    /**
     * Show a toast notification.
     * @param {string} message - Text to display
     * @param {string} type - "error" | "info" | "success"
     * @param {number} duration - Auto-dismiss in ms (0 = manual dismiss only)
     */
    window.showToast = function(message, type, duration) {
        type = type || 'info';
        duration = duration !== undefined ? duration : 5000;
        const colors = {
            error:   { bg: '#fdf0f0', border: '#e8c5c5', bar: '#c44', icon: '' },
            info:    { bg: '#f7ecd9', border: '#e8d5b5', bar: '#a08050', icon: '' },
            success: { bg: '#f0f8f0', border: '#c5e0c5', bar: '#6a9a5a', icon: '' },
        };
        const c = colors[type] || colors.info;
        const el = document.createElement('div');
        el.style.cssText = 'pointer-events:auto;border-radius:8px;padding:10px 14px;min-width:280px;max-width:400px;font-size:13px;font-family:inherit;box-shadow:0 2px 8px rgba(0,0,0,0.1);transition:opacity 0.3s;background:' + c.bg + ';border:1px solid ' + c.border + ';';
        el.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:start;gap:8px;"><span>' + escapeHtml(message) + '</span><span style="cursor:pointer;opacity:0.5;font-size:16px;line-height:1;" class="toast-close">&times;</span></div>';
        el.querySelector('.toast-close').onclick = function() { dismiss(el); };
        container.appendChild(el);
        if (duration > 0) {
            setTimeout(function() { dismiss(el); }, duration);
        }
    };

    function dismiss(el) {
        el.style.opacity = '0';
        setTimeout(function() { el.remove(); }, 300);
    }

    function escapeHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    // ── SSE download progress (lazy — only connects when downloads are active) ─
    const toasts = {};
    let evtSource = null;

    function connectSSE() {
        if (evtSource) return;
        evtSource = new EventSource('/api/downloads/stream');
        evtSource.onmessage = function(e) {
            const downloads = JSON.parse(e.data);
            const activeNames = new Set();
            downloads.forEach(function(dl) {
                activeNames.add(dl.name);
                if (!toasts[dl.name]) {
                    toasts[dl.name] = createDlToast(dl.name);
                    container.appendChild(toasts[dl.name]);
                }
                updateDlToast(toasts[dl.name], dl);
            });
            Object.keys(toasts).forEach(function(name) {
                if (!activeNames.has(name) && toasts[name]) {
                    toasts[name].remove();
                    delete toasts[name];
                }
            });
        };
        evtSource.onerror = function() {
            evtSource.close();
            evtSource = null;
        };
    }

    function createDlToast(name) {
        const el = document.createElement('div');
        el.style.cssText = 'pointer-events:auto;background:#f7ecd9;border:1px solid #e8d5b5;border-radius:8px;padding:10px 14px;min-width:280px;max-width:360px;font-size:13px;font-family:inherit;box-shadow:0 2px 8px rgba(0,0,0,0.1);transition:opacity 0.3s;';
        el.innerHTML = '<div style="display:flex;justify-content:space-between;margin-bottom:6px;"><strong class="dl-name"></strong><span class="dl-pct" style="color:#8a7a5a;"></span></div><div style="background:#e8d5b5;border-radius:4px;height:6px;overflow:hidden;"><div class="dl-bar" style="background:#a08050;height:100%;width:0%;transition:width 0.3s;border-radius:4px;"></div></div><div class="dl-status" style="margin-top:4px;font-size:11px;color:#8a7a5a;"></div>';
        return el;
    }

    function updateDlToast(el, dl) {
        el.querySelector('.dl-name').textContent = dl.name;
        el.querySelector('.dl-pct').textContent = dl.pct + '%';
        el.querySelector('.dl-bar').style.width = dl.pct + '%';
        if (dl.status === 'downloading') {
            el.querySelector('.dl-status').textContent = 'Downloading...';
        } else if (dl.status === 'ready') {
            el.querySelector('.dl-status').textContent = 'Complete';
            el.querySelector('.dl-bar').style.width = '100%';
            el.querySelector('.dl-bar').style.background = '#6a9a5a';
            setTimeout(function() { dismiss(el); delete toasts[dl.name]; }, 3000);
        } else if (dl.status === 'error') {
            el.querySelector('.dl-status').textContent = 'Error: ' + (dl.error || 'Unknown');
            el.querySelector('.dl-bar').style.background = '#c44';
        }
    }

    // Only connect if downloads are already active
    fetch('/api/downloads/status')
        .then(function(r) { return r.json(); })
        .then(function(downloads) {
            if (downloads.some(function(d) { return d.status !== 'idle'; })) connectSSE();
        })
        .catch(function() {});

    window.startDownloadSSE = connectSSE;
})();

// ── Update check ────────────────────────────────────────────────────────────
(function() {
    if (sessionStorage.getItem('update-check-done')) return;
    sessionStorage.setItem('update-check-done', '1');

    fetch('/api/update-check')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (!data.available) return;
            if (sessionStorage.getItem('dismiss-update-' + data.version)) return;

            var el = document.createElement('div');
            el.style.cssText = 'pointer-events:auto;background:#f7ecd9;border:1px solid #e8d5b5;border-radius:8px;padding:10px 14px;min-width:280px;max-width:360px;font-size:13px;font-family:inherit;box-shadow:0 2px 8px rgba(0,0,0,0.1);';
            el.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:start;gap:8px;margin-bottom:6px;">'
                + '<strong>Datamarkin ' + data.version + ' available</strong>'
                + '<span class="update-close" style="cursor:pointer;opacity:0.5;font-size:16px;line-height:1;">&times;</span></div>'
                + '<div class="update-actions" style="display:flex;gap:8px;align-items:center;">'
                + (data.download_url
                    ? '<button class="update-dl-btn" style="background:#a08050;color:#fff;border:none;border-radius:4px;padding:4px 12px;font-size:12px;cursor:pointer;">Download</button>'
                    : '')
                + '<a href="' + data.url + '" target="_blank" style="color:#a08050;font-size:12px;">View release</a></div>';

            el.querySelector('.update-close').onclick = function() {
                el.style.display = 'none';
                sessionStorage.setItem('dismiss-update-' + data.version, '1');
            };

            var dlBtn = el.querySelector('.update-dl-btn');
            if (dlBtn) {
                dlBtn.onclick = function() {
                    dlBtn.disabled = true;
                    dlBtn.textContent = 'Downloading\u2026';
                    fetch('/api/update-download', { method: 'POST' })
                        .then(function(r) { return r.json(); })
                        .then(function(res) {
                            if (res.ok) {
                                dlBtn.textContent = 'Downloaded';
                                dlBtn.style.background = '#6a9a5a';
                                showToast('Update downloaded. Check Finder to install.', 'success', 5000);
                            } else {
                                dlBtn.textContent = 'Download';
                                dlBtn.disabled = false;
                                showToast('Download failed: ' + (res.error || 'Unknown'), 'error', 5000);
                            }
                        })
                        .catch(function() {
                            dlBtn.textContent = 'Download';
                            dlBtn.disabled = false;
                            showToast('Download failed. Check your connection.', 'error', 5000);
                        });
                };
            }

            container.appendChild(el);
        })
        .catch(function() { /* offline — do nothing */ });
})();
</script>
</body>
</html>
